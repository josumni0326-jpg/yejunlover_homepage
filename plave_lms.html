<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>예준 CLASS | PLAVE Learning</title>
<style>
  :root {
    --bg:       #080810;
    --surface:  #10101e;
    --surface2: #18182a;
    --accent:   #ff3366;
    --accent2:  #ff7eb3;
    --green:    #00d68f;
    --text:     #f0f0ff;
    --muted:    #7070a0;
    --border:   #22223a;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Segoe UI', '맑은 고딕', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ─────────────────────────────── */
  header {
    height: 58px;
    flex-shrink: 0;
    background: rgba(8,8,16,.96);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    z-index: 50;
    backdrop-filter: blur(12px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }
  .logo-mark {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo-text { font-size: 17px; font-weight: 800; color: var(--text); letter-spacing: -.3px; }
  .logo-text em { color: var(--accent); font-style: normal; }

  .header-badge {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 7px 16px;
    font-size: 13px;
    color: var(--muted);
  }
  .header-badge strong { color: var(--accent); font-size: 15px; }

  /* ── LAYOUT ─────────────────────────────── */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* ── SIDEBAR ─────────────────────────────── */
  .sidebar {
    width: 290px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-top {
    padding: 20px 18px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-top h2 {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .prog-box {
    background: var(--surface2);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .prog-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .prog-row b { color: var(--text); }
  .prog-bar {
    height: 5px;
    background: var(--border);
    border-radius: 5px;
    overflow: hidden;
  }
  .prog-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 5px;
    transition: width .5s ease;
    width: 0%;
  }

  .lesson-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
  }
  .lesson-list::-webkit-scrollbar { width: 3px; }
  .lesson-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .lesson-item {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 11px 10px;
    border-radius: 10px;
    cursor: pointer;
    margin-bottom: 3px;
    border: 1px solid transparent;
    transition: background .15s, border .15s;
  }
  .lesson-item:hover { background: var(--surface2); }
  .lesson-item.active {
    background: rgba(255,51,102,.12);
    border-color: rgba(255,51,102,.35);
  }

  .num-badge {
    width: 34px; height: 34px;
    border-radius: 8px;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
    color: var(--muted);
    flex-shrink: 0;
    transition: background .2s, color .2s;
  }
  .lesson-item.active   .num-badge { background: var(--accent); color: #fff; }
  .lesson-item.done     .num-badge { background: var(--green);  color: #fff; }

  .lesson-info { flex: 1; min-width: 0; }
  .lesson-name {
    font-size: 13px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 3px;
  }
  .lesson-meta {
    font-size: 11px; color: var(--muted);
    display: flex; align-items: center; gap: 5px;
  }
  .tag {
    background: rgba(255,51,102,.2);
    color: var(--accent);
    font-size: 10px; font-weight: 700;
    padding: 1px 6px; border-radius: 4px;
  }
  .tag.green { background: rgba(0,214,143,.15); color: var(--green); }

  .chk {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    transition: all .2s;
  }
  .lesson-item.done .chk {
    background: var(--green);
    border-color: var(--green);
    color: #fff;
  }

  /* ── PLAYER AREA ─────────────────────────── */
  .player-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .player-stage {
    flex: 1;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .empty-state {
    text-align: center;
    color: var(--muted);
    user-select: none;
  }
  .empty-state .icon { font-size: 56px; margin-bottom: 14px; opacity: .4; }
  .empty-state p { font-size: 15px; }

  /* iframe wrapper — aspect-ratio approach */
  .frame-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
  }
  .frame-wrap.vertical iframe {
    /* shorts: 9:16 */
    height: min(calc(100vh - 180px), 600px);
    width: calc(min(calc(100vh - 180px), 600px) * 9 / 16);
    max-width: 340px;
    border: none;
  }
  .frame-wrap.horizontal iframe {
    /* 16:9 */
    max-width: min(100%, 920px);
    width: min(100%, 920px);
    height: calc(min(100%, 920px) * 9 / 16);
    max-height: calc(100vh - 180px);
    border: none;
  }

  /* ── INFO BAR ─────────────────────────────── */
  .info-bar {
    flex-shrink: 0;
    height: 72px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    gap: 16px;
  }

  .now-playing-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: blink 1.6s ease-in-out infinite;
    display: inline-block;
    margin-right: 6px;
  }
  @keyframes blink {
    0%,100% { opacity:1; } 50% { opacity:.3; }
  }

  .vid-title { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
  .vid-desc  { font-size: 12px; color: var(--muted); }

  .actions { display: flex; gap: 10px; flex-shrink: 0; }

  button {
    display: flex; align-items: center; gap: 7px;
    border: none; border-radius: 9px;
    padding: 9px 18px;
    font-size: 13px; font-weight: 700;
    cursor: pointer;
    transition: transform .15s, background .15s;
  }
  button:hover:not(:disabled) { transform: translateY(-1px); }
  button:disabled { opacity: .45; cursor: default; transform: none !important; }

  .btn-done  { background: var(--green);  color: #fff; }
  .btn-done.completed { background: var(--border); color: var(--muted); }
  .btn-next  { background: var(--accent); color: #fff; }

  /* ── TOAST ─────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 90px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--green);
    color: #fff;
    padding: 12px 24px;
    border-radius: 30px;
    font-size: 14px; font-weight: 700;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s, transform .3s;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-mark">🌟</div>
    <div class="logo-text">PLAVE <em>예준</em> CLASS</div>
  </div>
  <div class="header-badge">
    수강 진도 &nbsp;<strong id="h-pct">0%</strong>&nbsp;
    <span style="color:var(--border)">|</span>&nbsp;
    <span id="h-done">0</span> / <span id="h-total">3</span> 완료
  </div>
</header>

<div class="main">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <h2>강의 목록</h2>
      <div class="prog-box">
        <div class="prog-row"><b>전체 진행률</b><span id="s-pct">0%</span></div>
        <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
      </div>
    </div>
    <div class="lesson-list" id="lesson-list"></div>
  </aside>

  <!-- PLAYER -->
  <section class="player-area">
    <div class="player-stage" id="player-stage">
      <div class="empty-state">
        <div class="icon">▶</div>
        <p>왼쪽 목록에서 강의를 선택하세요</p>
      </div>
    </div>

    <div class="info-bar">
      <div>
        <div class="vid-title" id="vid-title">
          강의를 선택해주세요
        </div>
        <div class="vid-desc" id="vid-desc">PLAVE 예준의 영상 클래스</div>
      </div>
      <div class="actions">
        <button class="btn-done" id="btn-done" onclick="markDone()" disabled>
          ✓&nbsp;수강 완료
        </button>
        <button class="btn-next" id="btn-next" onclick="nextLesson()" disabled>
          다음 강의&nbsp;→
        </button>
      </div>
    </div>
  </section>

</div>

<!-- TOAST -->
<div class="toast" id="toast">🎉 수강 완료!</div>

<script>
  const VIDEOS = [
    {
      id:    'eBjU2vZkYaU',
      title: '예준 Shorts — Episode 1',
      desc:  '플레이브 예준의 쇼츠 영상 첫 번째 에피소드',
      type:  'shorts'
    },
    {
      id:    'H2kpnw1w3tU',
      title: '예준 Shorts — Episode 2',
      desc:  '플레이브 예준의 쇼츠 영상 두 번째 에피소드',
      type:  'shorts'
    },
    {
      id:    'kAAcl3nIe24',
      title: '예준 — Main Video',
      desc:  '플레이브 예준의 메인 영상',
      type:  'video'
    }
  ];

  let currentIdx = -1;
  let completed  = new Set(JSON.parse(localStorage.getItem('plave_done') || '[]'));

  /* ── helpers ── */
  function save()  { localStorage.setItem('plave_done', JSON.stringify([...completed])); }

  function updateProgress() {
    const pct = Math.round(completed.size / VIDEOS.length * 100);
    document.getElementById('prog-fill').style.width = pct + '%';
    document.getElementById('s-pct').textContent     = pct + '%';
    document.getElementById('h-pct').textContent     = pct + '%';
    document.getElementById('h-done').textContent    = completed.size;
    document.getElementById('h-total').textContent   = VIDEOS.length;
  }

  function renderList() {
    document.getElementById('lesson-list').innerHTML = VIDEOS.map((v, i) => {
      const done   = completed.has(v.id);
      const active = i === currentIdx;
      return `
        <div class="lesson-item ${active ? 'active' : ''} ${done ? 'done' : ''}"
             onclick="play(${i})">
          <div class="num-badge">${done ? '✓' : i + 1}</div>
          <div class="lesson-info">
            <div class="lesson-name">${v.title}</div>
            <div class="lesson-meta">
              <span class="tag ${done ? 'green' : ''}">${done ? '완료' : v.type === 'shorts' ? 'Shorts' : 'Video'}</span>
              ${active ? '<span style="color:var(--accent)">재생 중</span>' : ''}
            </div>
          </div>
          <div class="chk">${done ? '✓' : ''}</div>
        </div>`;
    }).join('');
  }

  /* ── play ── */
  function play(idx) {
    currentIdx = idx;
    const v = VIDEOS[idx];
    const isShorts = v.type === 'shorts';

    document.getElementById('player-stage').innerHTML = `
      <div class="frame-wrap ${isShorts ? 'vertical' : 'horizontal'}">
        <iframe
          src="https://www.youtube.com/embed/${v.id}?autoplay=1&rel=0&modestbranding=1"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen>
        </iframe>
      </div>`;

    document.getElementById('vid-title').innerHTML =
      `<span class="now-playing-dot"></span>${v.title}`;
    document.getElementById('vid-desc').textContent = v.desc;

    const isDone = completed.has(v.id);
    const btnDone = document.getElementById('btn-done');
    btnDone.disabled       = isDone;
    btnDone.className      = 'btn-done' + (isDone ? ' completed' : '');
    btnDone.innerHTML      = isDone ? '✓&nbsp;완료됨' : '✓&nbsp;수강 완료';

    document.getElementById('btn-next').disabled = idx >= VIDEOS.length - 1;

    renderList();
  }

  /* ── mark done ── */
  function markDone() {
    if (currentIdx < 0) return;
    const v = VIDEOS[currentIdx];
    completed.add(v.id);
    save();
    updateProgress();

    const btn = document.getElementById('btn-done');
    btn.disabled  = true;
    btn.className = 'btn-done completed';
    btn.innerHTML = '✓&nbsp;완료됨';

    showToast();
    renderList();

    if (currentIdx < VIDEOS.length - 1)
      setTimeout(() => nextLesson(), 1000);
  }

  function nextLesson() {
    if (currentIdx < VIDEOS.length - 1) play(currentIdx + 1);
  }

  /* ── toast ── */
  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  /* ── init ── */
  updateProgress();
  renderList();
</script>
</body>
</html>
